<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year Progress | Al Nahian</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="A beautifully designed, real-time year progress tracker with 8 unique themes including Windows 7, Cyberpunk, and GitHub.">
    <meta name="keywords"
        content="year progress, time tracker, real-time, themes, windows 7 aero, github contributions, cyberpunk, al nahian">
    <meta name="author" content="Al Nahian">

    <!-- Open Graph / Social Meta Tags -->
    <meta property="og:title" content="Year Progress Tracker">
    <meta property="og:description"
        content="Watch the year go by in real-time. Features 8 distinct themes including classic Windows and GitHub styles.">
    <meta property="og:image" content="https://nahian.pro.bd/year/preview.png">
    <meta property="og:url" content="https://nahian.pro.bd/year">
    <meta property="og:type" content="website">

    <!-- Replaced html2canvas with dom-to-image-more for better CSS rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/3.2.0/dom-to-image-more.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>

    <!-- Fonts loaded directly via link to fix download rendering issues -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Orbitron:wght@500;700&display=swap"
        rel="stylesheet" crossorigin="anonymous">

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">

</head>

<body class="theme-default">

    <!-- Center Bottom Action Buttons -->
    <div class="action-buttons" id="action-buttons">
        <button id="btn-switch-theme" title="Switch Theme">🎨</button>
        <button id="btn-download-img" title="Download Image">📥</button>
        <button id="btn-copy-hide-config-url" title="Copy URL with controls hidden (hide_config)">🔗</button>
    </div>

    <div class="wrapper">
        <div class="container">
            <!-- Win95 Title bar (Only visible in Win95 theme) -->
            <div class="win-titlebar">
                <span>Year Progress.exe</span>
                <button class="win-btn">X</button>
            </div>

            <!-- Win7 specific structural elements -->
            <div class="win7-titlebar win7-only">
                <div class="win7-title-left">
                    <div class="win7-icon"></div>
                    <span id="win7-title-time">Calculating time...</span>
                </div>
                <div class="win7-controls">
                    <button class="win7-min">_</button>
                    <button class="win7-max">□</button>
                    <button class="win7-close">✕</button>
                </div>
            </div>

            <div class="win7-inner-wrapper win7-only-block">
                <div class="win7-header">
                    <div class="win7-header-title">Loading Year <span id="win7-header-year"></span>...</div>
                </div>
                <div class="win-content">
                    <div class="win7-text">
                        <h1 class="title" style="color: #000;">Time elapsed: <strong><span id="win7-items"></span>
                                days</strong> (<span id="win7-pct-text"></span>%)</h1>
                        <p class="subtitle" style="color: #000;">Time remaining: <span id="win7-subtitle-time"></span>
                        </p>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="fill-win7" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="win7-footer">
                    <div class="win7-more-info">
                        <span class="win7-chevron"></span> More details
                    </div>
                    <button class="win7-cancel">Pause</button>
                </div>
            </div>

            <!-- Standard Layout Content -->
            <div class="standard-text">
                <h1 class="title"><span id="pct">0.00</span>% of <span id="year"></span> has passed</h1>
                <p class="subtitle" id="date">Loading...</p>

                <div class="progress-track">
                    <div class="progress-fill" id="fill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- GitHub Theme Content -->
            <div class="github-only">
                <div class="gh-header">
                    <div class="gh-title"><span id="gh-days-passed">0</span> days passed in <span
                            id="gh-year">2026</span></div>
                </div>
                <div class="gh-body">
                    <div class="gh-graph-container">
                        <div class="gh-grid-wrapper">
                            <div class="gh-grid" id="gh-grid">
                                <!-- Cells generated by JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
